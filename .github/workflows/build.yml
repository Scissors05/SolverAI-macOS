name: Build SolverAI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip3 install g4f colorama pyinstaller
          
      - name: Build macOS .app
        run: pyinstaller --onedir --windowed --name "SolverAI" SolverAI.py
          
      - name: Zip the .app
        run: |
          cd dist
          zip -r SolverAI-Mac.zip SolverAI.app
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SolverAI-Mac
          path: dist/SolverAI-Mac.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install g4f colorama pyinstaller
          
      - name: Build Windows .exe
        run: pyinstaller --onefile --console --name "SolverAI-Windows" SolverAI.py
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SolverAI-Windows
          path: dist/SolverAI-Windows.exe
